<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级 AI 情绪猫咪 (Deluxe Version)</title>
    <style>
        /* CSS 样式：打造高级感界面 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #e0f7fa; padding-top: 50px; }
        .game-container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); text-align: center; width: 400px; }
        
        /* 猫咪 SVG 容器 - 增加脉动动画 */
        #petWidget { width: 120px; height: 120px; margin: 0 auto; transition: transform 0.3s; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* 属性条样式 */
        .stats-container { display: flex; justify-content: space-around; margin: 25px 0; font-size: 0.9em; color: #555; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-bar { width: 60px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .stat-fill { height: 100%; background: #4caf50; width: 100%; transition: width 0.3s, background-color 0.3s; }

        /* 互动区 */
        .interaction-zone { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        button:hover { transform: translateY(-3px); }
        .feed-btn { background: #ff9800; color: white; }
        .sleep-btn { background: #3f51b5; color: white; }
        .play-btn { background: #e91e63; color: white; }
        .chat-btn { background: #009688; color: white; }
        
        /* 聊天区 */
        #userInput { width: 85%; padding: 12px; border: 2px solid #b2ebf2; border-radius: 8px; margin-bottom: 10px; }
        #responseLog { margin-top: 25px; border-top: 2px solid #b2ebf2; padding-top: 15px; text-align: left; height: 100px; overflow-y: auto; color: #555; font-size: 0.95em; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="petWidget" class="pet-container pet-happy">
        <svg viewBox="0 0 100 100">
            <text x="10" y="70" font-size="80" id="catEmoji">😊</text>
        </svg>
    </div>

    <div class="stats-container">
        <div class="stat-item"><span>饱食度</span><div class="stat-bar"><div id="fill-hunger" class="stat-fill"></div></div></div>
        <div class="stat-item"><span>精力</span><div class="stat-bar"><div id="fill-energy" class="stat-fill"></div></div></div>
        <div class="stat-item"><span>心情</span><div class="stat-bar"><div id="fill-mood" class="stat-fill"></div></div></div>
    </div>

    <div class="interaction-zone">
        <button class="feed-btn" onclick="interact('feed')">喂鱼 🐟</button>
        <button class="sleep-btn" onclick="interact('sleep')">睡觉 💤</button>
        <button class="play-btn" onclick="interact('play')">逗猫棒 🧶</button>
        <button class="chat-btn" onclick="openChat()">聊天 💬</button>
    </div>

    <div id="chatArea" style="display:none;">
        <input type="text" id="userInput" placeholder="告诉我今天怎么样...">
        <br>
        <button onclick="aiChat()">召唤 AI</button>
        <div id="responseLog">最近有什么新鲜事？</div>
    </div>
</div>

<script>
    // 🌟 核心：属性和状态 (The Attributes & States)
    let pet = {
        hunger: 100,
        energy: 100,
        mood: 100,
        state: 'happy' // happy, sad, sleeping, hungry, playing
    };

    // 🌟 模拟 AI 大脑词库 (The Pseudo-AI Brain)
    const aiDatabase = {
        sad: [ "抱抱你🥺，BIS 的课真的很难，金宝的雨又很大，但无论如何我都陪着你。你要加油哦！", "没关系的，我也感觉今天精力好低。休息一下吧，明天又是全新的一天。✨", "别给自己太大压力，现在的你已经很棒了！✨" ],
        happy: [ "太赞了！这种好心情要保持住！带我去金宝老街吃顿好的庆祝下！🥳", "好开心！看到你开心，我的精力值都要爆表了！🧶", "保持这种状态！你是最棒的！" ],
        neutral: [ "嗯哼，我在听。原来你是这么想的... 哪怕我是代码写的，我也在乎你的感受。🤔", "这样啊... 我知道了。谢谢你愿意跟我分享。🐱", "生活就是由这些小事组成的。😊" ]
    };

    // 🌟 逻辑引擎 (The Game Logic)
    function updateUI() {
        // 更新属性条
        updateBar('hunger');
        updateBar('energy');
        updateBar('mood');

        const emoji = document.getElementById('catEmoji');
        
        // 🌟 核心：表情多样化 (Emotional Mapping)
        // 根据不同属性组合，切换完全不同的表情和描述
        if (pet.state === 'sleeping') { emoji.innerText = "💤"; return; }
        if (pet.hunger < 30) { emoji.innerText = "🥺"; pet.state = 'hungry'; return; }
        if (pet.energy < 30) { emoji.innerText = "😫"; pet.state = 'tired'; return; }
        if (pet.mood < 30) { emoji.innerText = "☹️"; pet.state = 'sad'; return; }
        
        if (pet.mood >= 80) { emoji.innerText = "😊"; pet.state = 'happy'; return; }
        emoji.innerText = "🙂"; // 默认
    }

    function updateBar(statName) {
        const fill = document.getElementById(`fill-${statName}`);
        const value = pet[statName];
        fill.style.width = value + '%';
        if (value < 30) { fill.style.background = '#f44336'; } // 红色
        else if (value < 60) { fill.style.background = '#ffeb3b'; } // 黄色
        else { fill.style.background = '#4caf50'; } // 绿色
    }

    function interact(type) {
        if (pet.state === 'sleeping' && type !== 'sleep') { alert('猫咪在睡觉，不能互动哦！'); return; }

        if (type === 'feed') {
            pet.hunger = Math.min(100, pet.hunger + 30);
            pet.energy = Math.min(100, pet.energy + 10);
            alert('猫咪吃饱了！🐟 +30 Hunger, +10 Energy');
        } else if (type === 'sleep') {
            pet.state = 'sleeping';
            alert('猫咪开始睡觉了... 精力将缓慢恢复。💤');
            setTimeout(() => { pet.state = 'happy'; pet.energy = 100; alert('猫咪睡醒了，精力充沛！'); updateUI(); }, 5000); // 模拟睡觉
        } else if (type === 'play') {
            pet.hunger = Math.max(0, pet.hunger - 20);
            pet.energy = Math.max(0, pet.energy - 30);
            pet.mood = Math.min(100, pet.mood + 40);
            alert('逗猫棒真好玩！🧶 +40 Mood, -20 Hunger, -30 Energy');
        }
        updateUI();
    }

    function openChat() { document.getElementById('chatArea').style.display = 'block'; }

    function aiChat() {
        const input = document.getElementById('userInput').value;
        const log = document.getElementById('responseLog');
        if (!input) { alert("你还没跟我说话呢！"); return; }

        let category = 'neutral';
        // 简单的关键词匹配 (Sentiment Analysis 基础版)
        const sadWords = ['难过', '累', '压力', '失败', '哭', '雨', 'sad', 'tired'];
        const happyWords = ['开心', '棒', '赢', '好', 'happy', 'good'];

        if (sadWords.some(word => input.includes(word))) { category = 'sad'; pet.mood = Math.max(0, pet.mood - 10); }
        else if (happyWords.some(word => input.includes(word))) { category = 'happy'; pet.mood = Math.min(100, pet.mood + 10); }

        // 随机回复
        const randomReply = aiDatabase[category][Math.floor(Math.random() * aiDatabase[category].length)];
        log.innerText = `[你]: ${input}\n[猫咪]: ${randomReply}`;
        
        pet.energy = Math.max(0, pet.energy - 5); // 聊天也会消耗精力
        document.getElementById('userInput').value = ""; // 清空
        updateUI();
    }

    // 🌟 高级：自动消耗系统 (Real-time Decay)
    // 模拟真实的生命周期：每 2 秒，猫咪会自动变饿、变累
    setInterval(() => {
        if (pet.state === 'sleeping') return; // 睡觉时不消耗
        pet.hunger = Math.max(0, pet.hunger - 1);
        pet.energy = Math.max(0, pet.energy - 2);
        pet.mood = Math.max(0, pet.mood - 0.5); // 心情下降较慢
        updateUI();
    }, 2000);

    updateUI(); // 初始刷新
</script>

</body>
</html>
